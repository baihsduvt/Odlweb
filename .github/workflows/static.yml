name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 注意：这里不要写 cache: 'pnpm'，除非你已经安装了 pnpm
          # 如果还没安装 pnpm，先注释掉 cache 或改用 npm/yarn 缓存策略
          # 或者使用下面的 pnpm/action-setup 自动处理缓存

      # ✅ 新增步骤：安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 指定你本地使用的 pnpm 版本，或使用 'latest'
          run_install: false # 设置为 false，因为我们后面会手动运行 install

      - name: Install dependencies
        # 现在可以使用 pnpm 了
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 确保这与你的 vite.config.ts 中的 outDir 一致

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
